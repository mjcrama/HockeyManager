<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark navy blue -->
  <rect width="512" height="512" rx="96" fill="#0d2050"/>
  <!-- Field gradient overlay -->
  <rect x="80" y="60" width="352" height="392" rx="8" fill="rgba(21,101,192,0.18)"/>
  <!-- Field outline -->
  <rect x="80" y="60" width="352" height="392" rx="8" fill="none" stroke="rgba(147,197,253,0.65)" stroke-width="12"/>
  <!-- Centre line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="rgba(147,197,253,0.4)" stroke-width="8"/>
  <!-- Centre circle -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="rgba(147,197,253,0.4)" stroke-width="8"/>
  <!-- Top goal -->
  <rect x="192" y="60" width="128" height="40" fill="rgba(21,101,192,0.3)" stroke="rgba(147,197,253,0.85)" stroke-width="10"/>
  <!-- Bottom goal -->
  <rect x="192" y="412" width="128" height="40" fill="rgba(21,101,192,0.3)" stroke="rgba(147,197,253,0.85)" stroke-width="10"/>
  <!-- Hockey stick: handle -->
  <line x1="310" y1="165" x2="228" y2="318" stroke="#60a5fa" stroke-width="20" stroke-linecap="round"/>
  <!-- Hockey stick: curved toe -->
  <path d="M228 318 Q214 348 238 354 Q264 360 272 334" fill="none" stroke="#60a5fa" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ball -->
  <circle cx="234" cy="350" r="22" fill="#93c5fd"/>
</svg>
